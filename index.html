<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستودع</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#050505,#10131a,#1a1f28);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#00ffd5;
filter:blur(180px);
left:-120px;
top:-120px;
opacity:.4;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:#0088ff;
filter:blur(180px);
right:-120px;
bottom:-120px;
opacity:.4;
}

.box{
display:flex;
flex-direction:column;
gap:18px;
z-index:2;
}

button{
width:270px;
height:60px;
border:none;
border-radius:18px;
font-size:21px;
font-weight:bold;
cursor:pointer;
color:white;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

transition:.35s;
}

button:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 0 35px #00ffd588;
}

.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
z-index:100;
animation:fade .25s;
}

.card{
width:320px;
padding:30px;
border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.2);

color:white;
text-align:center;

animation:pop .35s;
}

.card h2{
margin-bottom:15px;
font-size:28px;
}

.card p{
color:#ddd;
line-height:1.8;
margin-bottom:25px;
}

.close{
width:100%;
height:50px;
background:#00c896;
}

@keyframes pop{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}
</style>

</head>

<body>

<div class="box">

<button onclick="window.open('https://mnxzywod3660-collab.github.io/haziim/','_blank')">
📦 المستودع الرئيسي
</button>

<button onclick="openCard()">
👑 صانع الموقع
</button>

</div>

<div class="modal" id="modal">

<div class="card">

<h2>👑 حازم</h2>

<p>
تم تصميم وبرمجة هذا الموقع بواسطة
<br><br>
<b>حازم</b>
<br><br>
شكراً لاستخدامك الموقع ❤️
</p>

<button class="close" onclick="closeCard()">
إغلاق
</button>

</div>

</div>

<script>
function openCard(){
document.getElementById("modal").style.display="flex";
}

function closeCard(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target==document.getElementById("modal")){
closeCard();
}
}
</script>

</body>
</html>
